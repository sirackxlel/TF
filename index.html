<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Calendario Guerrero con login, registro y notas por dia."
    />
    <title>Calendario Guerrero</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="intro" aria-label="Calendario Guerrero">
        <a class="brand" href="/" aria-label="Calendario Guerrero inicio">
          <span class="brand-mark">C</span>
          <span class="brand-name">Calendario Guerrero</span>
        </a>

        <div class="intro-copy">
          <h1>Calendario Guerrero</h1>
        </div>
      </section>

      <section class="login-card" aria-label="Ingreso de usuarios">
        <div id="loginView">
          <div class="card-heading">
            <p>Ingreso</p>
            <h2>Iniciar sesion</h2>
          </div>

          <form id="loginForm" novalidate>
            <label for="loginEmail">Email</label>
            <input
              id="loginEmail"
              name="loginEmail"
              type="email"
              autocomplete="email"
              placeholder="persona@email.com"
              required
            />

            <p class="form-error" id="loginError" role="alert"></p>

            <button class="primary-button" type="submit">Ingresar</button>
          </form>

          <button class="secondary-button compact-button" id="showCreateUserButton" type="button">
            Crear usuario nuevo
          </button>
        </div>

        <div class="is-hidden" id="formView">
          <div class="card-heading">
            <p>Registro</p>
            <h2>Crear usuario</h2>
          </div>

          <form id="userForm" novalidate>
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="persona@email.com"
              required
            />

            <label for="fullName">Nombre completo</label>
            <input
              id="fullName"
              name="fullName"
              type="text"
              autocomplete="name"
              placeholder="Ignacio Guerrero"
              required
            />

            <label for="phone">Numero</label>
            <input
              id="phone"
              name="phone"
              type="tel"
              autocomplete="tel"
              placeholder="+54 11 6722 7112"
              required
            />

            <label for="country">Pais</label>
            <select id="country" name="country" autocomplete="country-name" required>
              <option value="">Seleccionar pais</option>
              <option value="Argentina">Argentina</option>
              <option value="Uruguay">Uruguay</option>
              <option value="Chile">Chile</option>
              <option value="Brasil">Brasil</option>
              <option value="Paraguay">Paraguay</option>
              <option value="Bolivia">Bolivia</option>
              <option value="Mexico">Mexico</option>
              <option value="Colombia">Colombia</option>
              <option value="Peru">Peru</option>
              <option value="Espana">Espana</option>
              <option value="Estados Unidos">Estados Unidos</option>
            </select>

            <p class="form-error" id="formError" role="alert"></p>

            <button class="primary-button" type="submit">Guardar usuario</button>
          </form>

          <button class="secondary-button compact-button" id="showLoginButton" type="button">
            Ya tengo usuario
          </button>
        </div>

        <div class="dashboard is-hidden" id="dashboardView">
          <section class="calendar-panel" aria-label="Calendario de notas">
            <div class="calendar-header">
              <button class="calendar-nav" id="previousMonthButton" type="button" aria-label="Mes anterior">
                &lt;
              </button>
              <h3 id="calendarTitle">Calendario</h3>
              <button class="calendar-nav" id="nextMonthButton" type="button" aria-label="Mes siguiente">
                &gt;
              </button>
            </div>

            <div class="calendar-weekdays" aria-hidden="true">
              <span>Lun</span>
              <span>Mar</span>
              <span>Mie</span>
              <span>Jue</span>
              <span>Vie</span>
              <span>Sab</span>
              <span>Dom</span>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>

            <form class="note-form" id="noteForm">
              <label for="noteText">Nota del dia</label>
              <textarea
                id="noteText"
                name="noteText"
                rows="3"
                placeholder="Escribir nota..."
              ></textarea>

              <div class="note-colors" role="radiogroup" aria-label="Color de la nota">
                <label class="color-choice green">
                  <input type="radio" name="noteColor" value="green" checked />
                  <span>Verde</span>
                </label>
                <label class="color-choice yellow">
                  <input type="radio" name="noteColor" value="yellow" />
                  <span>Amarillo</span>
                </label>
                <label class="color-choice red">
                  <input type="radio" name="noteColor" value="red" />
                  <span>Rojo</span>
                </label>
              </div>

              <p class="selected-date" id="selectedDateLabel"></p>
              <button class="primary-button" type="submit">Agregar nota</button>
              <div class="notes-list" id="notesList" aria-label="Notas del dia"></div>
            </form>
          </section>

          <button class="secondary-button logout-button" id="newUserButton" type="button">
            Cerrar sesion
          </button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
